<script type="text/markdown" id="markdown-en">
# 🚀 Taqeem Installation Guide

Follow these simple steps to set up the Taqeem evaluation system for your school.

## 1. Supabase Backend Setup (5 mins)

The app needs a database to store students and scores.

1.  **Create a Project**: Go to [Supabase](https://supabase.com/) and create a new project.
2.  **Run Setup Script**: 
    - Open the **SQL Editor** in your Supabase dashboard.
    - Click **New Query**.
    - Copy the SQL script provided on the Taqeem home page.
    - Paste it into the SQL Editor and click **Run**.
3.  **Storage Setup**:
    - Go to the **Storage** tab in Supabase.
    - Create a new bucket named `winner-photos`.
    - Make sure the bucket is set to **Public**.
4.  **Get Credentials**:
    - Go to **Project Settings** > **API**.
    - Copy your **Project URL** and your **anon public** key.

---

## 2. Generate Client Package (2 mins)

Instead of editing code manually, use our builder tool on the home page:

1.  Go to the **Generator** section on the home page.
2.  Paste the **Project URL** and **Anon Key** you copied from Supabase.
3.  Click **Generate My School's ZIP**.
4.  A ZIP file will download containing the *entire* customized application for your school.

---

## 3. Launching the App (3 mins)

You can host the files anywhere (GitHub Pages, Netlify, Vercel, or even a basic server).

### Option A: Netlify Drop (Fastest)
1.  Go to [Netlify Drop](https://app.netlify.com/drop).
2.  Drag and drop the **ZIP file** you just generated.
3.  Your app is live!

### Option B: GitHub Pages
1.  Extract the ZIP and push the files to a new GitHub repository.
2.  Enable **GitHub Pages** in the repository settings.

---

## 4. Usage Tips

*   **Admin Login**: The default login is `admin` with password `admin123`. Change this in the "Setup > Users" tab once logged in.
*   **Install as PWA**: Open the app URL on a mobile device (Chrome on Android or Safari on iOS) and choose "Add to Home Screen" for a smooth, native app experience.
*   **Winner Display**: Open the `/winners/` relative URL on a projector or separate screen. It will update automatically when you "Push" a winner from the results tab.

---

### Need Help?
Check the documentation in the original project or reach out for support.

<script type="text/markdown" id="markdown-ar">
# 🚀 دليل تثبيت Taqeem

اتبع هذه الخطوات البسيطة لإعداد نظام تقييم Taqeem لمدرستك.

## 1. إعداد Supabase (5 دقائق)

يحتاج التطبيق إلى قاعدة بيانات لتخزين الطلاب والنتائج.

1.  **إنشاء مشروع**: انتقل إلى [Supabase](https://supabase.com/) وأنشئ مشروعًا جديدًا.
2.  **تشغيل نص الإعداد**: 
    - افتح **محرر SQL** في لوحة تحكم Supabase الخاصة بك.
    - انقر على **استعلام جديد**.
    - انسخ نص SQL المقدم في الصفحة الرئيسية لـ Taqeem.
    - الصقه في محرر SQL وانقر على **تشغيل**.
3.  **إعداد التخزين**:
    - انتقل إلى علامة التبويب **التخزين (Storage)** في Supabase.
    - أنشئ حاوية (bucket) جديدة باسم `winner-photos`.
    - تأكد من تعيين الحاوية كـ **عامة (Public)**.
4.  **الحصول على بيانات الاعتماد**:
    - انتقل إلى **إعدادات المشروع** > **واجهة برمجة التطبيقات (API)**.
    - انسخ **رابط المشروع (Project URL)** ومفتاح **anon** العام.

---

## 2. إنشاء حزمة العميل (دقيقتان)

بدلاً من تحرير الكود يدويًا، استخدم أداة المولد الخاصة بنا في الصفحة الرئيسية:

1.  انتقل إلى قسم **المولد** في الصفحة الرئيسية.
2.  الصق **رابط المشروع** ومفتاح **Anon** اللذين نسختهما من Supabase.
3.  انقر فوق **إنشاء ملف ZIP لمدرستي**.
4.  سيتم تنزيل ملف ZIP يحتوي على التطبيق المخصص *بالكامل* لمدرستك.

---

## 3. إطلاق التطبيق (3 دقائق)

يمكنك استضافة الملفات في أي مكان (GitHub Pages، Netlify، Vercel، أو حتى خادم أساسي).

### الخيار أ: Netlify Drop (الأسرع)
1.  انتقل إلى [Netlify Drop](https://app.netlify.com/drop).
2.  قم بسحب وإفلات **ملف ZIP** الذي قمت بإنشائه للتو.
3.  تطبيقك الآن مباشر!

### الخيار ب: GitHub Pages
1.  قم بفك ضغط ملف ZIP وادفع الملفات إلى مستودع GitHub جديد.
2.  قم بتمكين **GitHub Pages** في إعدادات المستودع.

---

## 4. نصائح الاستخدام

*   **تسجيل دخول المسؤول**: تسجيل الدخول الافتراضي هو `admin` بكلمة مرور `admin123`. قم بتغيير ذلك في علامة التبويب "الإعداد > المستخدمون" بمجرد تسجيل الدخول.
*   **التثبيت كتطبيق ويب (PWA)**: افتح رابط التطبيق على جهاز محمول (Chrome على Android أو Safari على iOS) واختر "إضافة إلى الشاشة الرئيسية" للحصول على تجربة تطبيق سلسة وأصلية.
*   **عرض الفائز**: افتح رابط العرض المباشر في علامة تبويب النتائج. سيتم تحديثه تلقائيًا عند "دفع" فائز من علامة تبويب النتائج.

---

### هل تحتاج مساعدة؟
تحقق من الوثائق في المشروع الأصلي أو تواصل للحصول على الدعم.

<script>
    const translations = {
        en: {
            'app-name': 'Taqeem',
            'page-title': 'Documentation | Taqeem Installation Guide',
            'nav-back': '← Back to App Builder',
            'lang-btn': 'ARABIC',
            'footer-text': '© 2026 TAQEEM PROJECT. Built for schools, engineered for excellence.'
        },
        ar: {
            'app-name': 'تقييم',
            'page-title': 'الوثائق الفنية | دليل التثبيت',
            'nav-back': '← العودة لمنشئ التطبيق',
            'lang-btn': 'ENGLISH',
            'footer-text': '© 2026 مشروع تقييم. بني للمدارس، وهُندس للتميز.'
        }
    };

    let currentLang = localStorage.getItem('taqeem_lang') || 'en';

    function setLanguage(lang) {
        currentLang = lang;
        localStorage.setItem('taqeem_lang', lang);
        document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
        document.documentElement.lang = lang;
        
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            if (translations[lang][key]) {
                el.textContent = translations[lang][key];
            }
        });

        document.getElementById('page-title').textContent = translations[lang]['page-title'];
        document.getElementById('lang-btn').textContent = translations[lang]['lang-btn'];
        renderDocs();
    }

    function toggleLang() {
        setLanguage(currentLang === 'en' ? 'ar' : 'en');
    }

    // Theme Logic
    let currentTheme = localStorage.getItem('taqeem_theme') || 'dark';
    
    function setTheme(theme) {
        currentTheme = theme;
        localStorage.setItem('taqeem_theme', theme);
        document.documentElement.setAttribute('data-theme', theme);
        document.getElementById('theme-btn').textContent = theme === 'dark' ? '🌙' : '☀️';
    }

    function toggleTheme() {
        setTheme(currentTheme === 'dark' ? 'light' : 'dark');
    }

    setTheme(currentTheme);

    // Markdown Render
    function renderDocs() {
        const container = document.getElementById('doc-content');
        const source = document.getElementById('markdown-' + currentLang);
        
        try {
            const markdown = source.innerHTML.trim();
            
            marked.setOptions({
                breaks: true,
                gfm: true
            });

            container.innerHTML = marked.parse(markdown);
            
            setTimeout(() => {
                container.classList.add('loaded');
                if (window.Prism) Prism.highlightAll();
            }, 100);

        } catch (err) {
            container.innerHTML = `<div style="color:red; padding:20px; border:1px solid red; border-radius:8px;">
                <h2>Failed to render documentation</h2>
                <p>${err.message}</p>
            </div>`;
            container.classList.add('loaded');
        }
    }

    // Initial load
    setLanguage(currentLang);
</script>
