<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">Taqeem Wiki | The Blueprint for Excellence</title>
  <link rel="icon" href="icons/logo.png" type="image/png">
  
  <!-- Social Preview Metadata -->
  <meta property="og:title" content="Taqeem Wiki | The Blueprint for Excellence">
  <meta property="og:description" content="Documentation and guides for the Taqeem student evaluation platform.">
  <meta property="og:image" content="https://taqeem.appwand.net/icons/logo.png">
  <meta property="og:url" content="https://taqeem.appwand.net/wiki.html">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Taqeem Wiki | The Blueprint for Excellence">
  <meta name="twitter:description" content="Documentation and guides for the Taqeem student evaluation platform.">
  <meta name="twitter:image" content="https://taqeem.appwand.net/icons/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Public+Sans:wght@300;400;600;700&family=Space+Mono:wght@400;700&family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --bg: #0f172a;
      --surface: #1e293b;
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --border: rgba(148, 163, 184, 0.2);
      --glass-bg: rgba(15, 23, 42, 0.8);
      --font-main: 'Public Sans', sans-serif;
      --font-heading: 'Outfit', sans-serif;
      --font-mono: 'Space Mono', monospace;
      --font-arabic: 'Cairo', sans-serif;
      --transition: all 0.3s ease;
    }

    [data-theme="light"] {
      --bg: #f8fafc;
      --surface: #ffffff;
      --text: #0f172a;
      --text-muted: #64748b;
      --border: rgba(15, 23, 42, 0.1);
      --glass-bg: rgba(248, 250, 252, 0.8);
    }

    [dir="rtl"] {
      --font-main: var(--font-arabic);
      --font-heading: var(--font-arabic);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-main);
      background-color: var(--bg);
      color: var(--text);
      line-height: 1.6;
      transition: var(--transition);
    }

    nav {
      height: 80px;
      display: flex;
      align-items: center;
      border-bottom: 1px solid var(--border);
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
    }
    .logo-container {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: var(--text);
      font-family: var(--font-heading);
      font-weight: 800;
      font-size: 1.5rem;
    }
    .logo-img { width: 32px; height: 32px; filter: brightness(0) invert(1); }
    [data-theme="light"] .logo-img { filter: none; }

    .wiki-layout {
      display: grid;
      grid-template-columns: 300px 1fr;
      max-width: 1400px;
      margin: 0 auto;
      min-height: calc(100vh - 80px);
    }

    .sidebar {
      padding: 40px 24px;
      border-right: 1px solid var(--border);
      position: sticky;
      top: 80px;
      height: calc(100vh - 80px);
      overflow-y: auto;
    }

    .sidebar-title {
      font-family: var(--font-heading);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--primary);
      margin-bottom: 24px;
      font-weight: 800;
    }

    .sidebar-nav { list-style: none; }
    .sidebar-nav li { margin-bottom: 8px; }
    .sidebar-nav a {
      display: block;
      padding: 10px 16px;
      color: var(--text-muted);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
      border-radius: 6px;
      transition: var(--transition);
    }
    .sidebar-nav a:hover { color: var(--text); background: rgba(79, 70, 229, 0.05); }
    .sidebar-nav a.active { color: var(--primary); background: rgba(79, 70, 229, 0.1); border-left: 3px solid var(--primary); }

    .main-content {
      padding: 60px 80px;
      max-width: 900px;
    }

    /* Markdown Styling */
    .markdown-body h1 {
      font-family: var(--font-heading);
      font-size: 2.5rem;
      font-weight: 800;
      margin-bottom: 32px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    .markdown-body h2 {
      font-family: var(--font-heading);
      font-size: 1.8rem;
      margin-top: 48px;
      margin-bottom: 24px;
    }
    .markdown-body p { margin-bottom: 20px; color: var(--text-muted); font-size: 1.1rem; line-height: 1.8; }
    .markdown-body ul, .markdown-body ol { margin-left: 24px; margin-bottom: 24px; color: var(--text-muted); }
    .markdown-body li { margin-bottom: 8px; }
    .markdown-body code { font-family: var(--font-mono); background: var(--surface); padding: 2px 6px; border-radius: 4px; font-size: 0.9rem; }
    .markdown-body pre { background: #000; padding: 24px; border-radius: 8px; overflow-x: auto; margin-bottom: 24px; border: 1px solid var(--border); }
    .markdown-body pre code { background: transparent; padding: 0; color: #10b981; }
    .markdown-body hr { border: 0; border-top: 1px solid var(--border); margin: 40px 0; }

    @media (max-width: 900px) {
      .wiki-layout { grid-template-columns: 1fr; }
      .sidebar { position: relative; height: auto; border-right: none; border-bottom: 1px solid var(--border); top: 0; }
      .main-content { padding: 40px 24px; }
    }

    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.9rem;
      margin-bottom: 40px;
      transition: var(--transition);
    }
    .btn-back:hover { color: var(--primary); }

    .nav-actions { display: flex; gap: 12px; }
    .theme-toggle, .lang-toggle {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0 12px;
      height: 36px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 700;
      font-size: 0.8rem;
    }
  </style>
</head>
<body data-theme="dark">

<nav>
  <div class="nav-container">
    <a href="index.html" class="logo-container">
      <img src="icons/logo.png" alt="Logo" class="logo-img">
      <span data-i18n="app-name">Taqeem</span>
    </a>
    <div class="nav-actions">
      <button onclick="toggleTheme()" class="theme-toggle" id="theme-btn">\ud83c\udf19</button>
      <button onclick="toggleLang()" class="lang-toggle" id="lang-btn">ARABIC</button>
    </div>
  </div>
</nav>

<div class="wiki-layout">
  <aside class="sidebar">
    <div class="sidebar-title" data-i18n="wiki-nav-title">Documentation Portal</div>
    <ul class="sidebar-nav">
      <li><a href="#Home" id="link-Home" onclick="navigate('Home')" data-i18n="wiki-home">Overview</a></li>
      <li><a href="#Features" id="link-Features" onclick="navigate('Features')" data-i18n="wiki-features">Features</a></li>
      <li><a href="#Admin-Guide" id="link-Admin-Guide" onclick="navigate('Admin-Guide')" data-i18n="wiki-admin">Admin Guide</a></li>
      <li><a href="#Judge-Guide" id="link-Judge-Guide" onclick="navigate('Judge-Guide')" data-i18n="wiki-judge">Judge Guide</a></li>
      <li><a href="#Setup-Guide" id="link-Setup-Guide" onclick="navigate('Setup-Guide')" data-i18n="wiki-setup">Setup Guide</a></li>
    </ul>
  </aside>

  <main class="main-content">
    <a href="index.html" class="btn-back">\u2190 <span data-i18n="btn-back">Back to Landing</span></a>
    <div id="wiki-content" class="markdown-body">
      <!-- Content loaded here -->
    </div>
  </main>
</div>

<script>
  const translations = {
    en: {
      'app-name': 'Taqeem',
      'wiki-nav-title': 'Documentation Portal',
      'wiki-home': 'Overview',
      'wiki-features': 'Features',
      'wiki-admin': 'Admin Guide',
      'wiki-judge': 'Judge Guide',
      'wiki-setup': 'Setup Guide',
      'btn-back': 'Back to Landing',
      'lang-btn': 'ARABIC'
    },
    ar: {
      'app-name': 'تقييم',
      'wiki-nav-title': 'بوابة المعرفة',
      'wiki-home': 'نظرة عامة',
      'wiki-features': 'المميزات',
      'wiki-admin': 'دليل المشرف',
      'wiki-judge': 'دليل المحكم',
      'wiki-setup': 'دليل الإعداد',
      'btn-back': 'العودة للرئيسية',
      'lang-btn': 'ENGLISH'
    }
  };

  let currentLang = localStorage.getItem('taqeem_lang') || 'en';

  function setLanguage(lang) {
    currentLang = lang;
    localStorage.setItem('taqeem_lang', lang);
    document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
    document.documentElement.lang = lang;
    
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      if (translations[lang][key]) el.textContent = translations[lang][key];
    });
    
    document.getElementById('lang-btn').textContent = translations[lang]['lang-btn'];
  }

  function toggleLang() {
    setLanguage(currentLang === 'en' ? 'ar' : 'en');
    const page = window.location.hash.substring(1) || 'Home';
    navigate(page);
  }

  function toggleTheme() {
    const body = document.body;
    const isDark = body.getAttribute('data-theme') === 'dark';
    body.setAttribute('data-theme', isDark ? 'light' : 'dark');
    document.getElementById('theme-btn').textContent = isDark ? '☀️' : '🌙';
    localStorage.setItem('taqeem_theme', isDark ? 'light' : 'dark');
  }

  async function navigate(page) {
    const contentEl = document.getElementById('wiki-content');
    contentEl.style.opacity = '0.5';
    
    try {
      const fileName = currentLang === 'ar' ? `${page}_ar` : page;
      const response = await fetch(`wiki/${fileName}.md`);
      const text = await response.text();
      contentEl.innerHTML = marked.parse(text);
      
      document.querySelectorAll('.sidebar-nav a').forEach(a => a.classList.remove('active'));
      const activeLink = document.getElementById(`link-${page}`);
      if (activeLink) activeLink.classList.add('active');
      
      if (window.location.hash.substring(1) !== page) {
        window.location.hash = page;
      }
      contentEl.style.opacity = '1';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    } catch (e) {
      contentEl.innerHTML = '<p>Error loading document.</p>';
      contentEl.style.opacity = '1';
    }
  }

  window.onhashchange = () => {
    const page = window.location.hash.substring(1) || 'Home';
    navigate(page);
  };

  // Init
  const theme = localStorage.getItem('taqeem_theme') || 'dark';
  document.body.setAttribute('data-theme', theme);
  document.getElementById('theme-btn').textContent = theme === 'dark' ? '🌙' : '☀️';
  setLanguage(currentLang);
  
  const initialPage = window.location.hash.substring(1) || 'Home';
  navigate(initialPage);
</script>

</body>
</html>
